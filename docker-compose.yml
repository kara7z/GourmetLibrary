services:
  db:
    image: mysql:8
    container_name: gourmet_db
    restart: always
    environment:
      MYSQL_DATABASE: gourmetlibrary
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_USER: laravel
      MYSQL_PASSWORD: 1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
